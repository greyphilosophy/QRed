name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [frontend-build]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest playwright reportlab pytest-playwright
          python -m playwright install chromium
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Start frontend dev server
        working-directory: frontend
        run: |
          npm run start &
          echo "Waiting for frontend..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 > /dev/null 2>&1 && echo "Frontend ready" && break
            sleep 1
          done
      - name: Run E2E tests
        env:
          QRED_BASE_URL: "http://localhost:3000"
        run: pytest tests/test_corrupt_pdf.py -v --tb=short