name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest httpx
          pip install -e .
      - name: Run BDD tests
        run: pytest tests/test_qred.py -v --tb=short

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest httpx
          pip install -e .
      - name: Install Playwright dependencies
        run: |
          python -m pip install playwright>=1.40
          python -m playwright install --with-deps chromium
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Start backend server
        run: |
          cd "$GITHUB_WORKSPACE"
          uvicorn backend.app:create_app --host 127.0.0.1 --port 8190 --app-dir . &
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8190/api/health > /dev/null 2>&1 && echo "Backend ready" && break
            sleep 1
          done
      - name: Start frontend dev server
        run: |
          cd "$GITHUB_WORKSPACE/frontend"
          VITE_API_PROXY_TARGET=http://127.0.0.1:8190 npm run start &
          echo "Waiting for frontend..."
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:3000 > /dev/null 2>&1 && echo "Frontend ready" && break
            sleep 1
          done
      - name: Run E2E tests
        env:
          QRED_BASE_URL: "http://localhost:3000"
        run: pytest tests/test_corrupt_pdf.py -v --tb=short