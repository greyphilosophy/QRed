<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QRed — QR Photo Analyzer</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --primary: #3b82f6;
    --success: #10b981;
    --warning: #f59e0b;
    --text: #f8fafc;
    --text-dim: #94a3b8;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    padding: 1.5rem 2rem;
    text-align: center;
    border-bottom: 1px solid #334155;
    background: var(--surface);
  }
  header h1 { font-size: 1.5rem; font-weight: 700; }
  header p { color: var(--text-dim); font-size: 0.9rem; margin-top: 0.25rem; }
  main {
    max-width: 800px;
    margin: 0 auto;
    padding: 2rem;
  }
  .upload-zone {
    border: 2px dashed #334155;
    border-radius: var(--radius);
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--primary);
    background: rgba(59, 130, 246, 0.05);
  }
  .upload-zone.scanning {
    border-color: var(--warning);
    background: rgba(245, 158, 11, 0.06);
    box-shadow: 0 0 0 1px rgba(245, 158, 11, 0.25) inset;
  }
  .upload-zone.scanning .upload-button {
    background: var(--warning);
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.02); }
  }
  .upload-zone .icon { font-size: 3rem; opacity: 0.5; }
  .upload-zone p { margin-top: 0.5rem; color: var(--text-dim); }
  .upload-zone .hint { font-size: 0.8rem; margin-top: 0.25rem; color: var(--text-dim); opacity: 0.7; }
  .upload-status {
    margin-top: 0.85rem;
    font-size: 0.9rem;
    color: var(--text-dim);
    min-height: 1.25em;
  }
  .upload-status.loading { color: var(--warning); }
  .upload-status.ready { color: var(--text-dim); }
  .upload-status.done { color: var(--success); }
  .app-version {
    display: inline-block;
    margin-left: 0.5rem;
    padding: 0.15rem 0.45rem;
    border-radius: 999px;
    background: rgba(59, 130, 246, 0.15);
    color: var(--primary);
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .commit-version {
    display: inline-block;
    margin-left: 0.35rem;
    padding: 0.15rem 0.45rem;
    border-radius: 999px;
    background: rgba(245, 158, 11, 0.15);
    color: var(--warning);
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  #fileInput { position: absolute; left: -9999px; width: 1px; height: 1px; opacity: 0; }
  .upload-button {
    display: block;
    width: 100%;
    max-width: 260px;
    margin-top: 1rem;
    padding: 0.85rem 1.2rem;
    border: 0;
    border-radius: 999px;
    background: var(--primary);
    color: white;
    font-weight: 700;
    cursor: pointer;
    white-space: normal;
    line-height: 1.2;
    text-align: center;
  }
  .upload-button:hover { filter: brightness(1.05); }
  .results { margin-top: 2rem; }
  .result-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    border: 1px solid #334155;
  }
  .result-card.loading { border-color: var(--warning); }
  .result-card.loading h3 { color: var(--warning); }
  .result-card h3 {
    font-size: 1.1rem;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .result-card.error h3 { color: #ef4444; }
  .result-card.success h3 { color: var(--success); }
  .result-card.info h3 { color: var(--primary); }
  .detail-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 0.5rem 1rem;
    font-size: 0.9rem;
  }
  .detail-grid .label {
    color: var(--text-dim);
    text-align: right;
  }
  .detail-grid .value {
    font-family: "SF Mono", "Fira Code", monospace;
    word-break: break-all;
  }
  .preview-img {
    max-width: 200px;
    max-height: 200px;
    border-radius: 8px;
    border: 1px solid #334155;
    margin-bottom: 1rem;
  }
  .hex-dump {
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 1rem;
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 0.8rem;
    line-height: 1.6;
    overflow-x: auto;
    white-space: pre;
    color: var(--success);
  }
  .badge {
    display: inline-block;
    padding: 0.2rem 0.6rem;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 600;
  }
  .badge-success { background: rgba(16, 185, 129, 0.15); color: var(--success); }
  .badge-warning { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
  .badge-info { background: rgba(59, 130, 246, 0.15); color: var(--primary); }
  .badge-error { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
  .hidden-payload-section {
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 1rem;
    margin-top: 1rem;
  }
  .hidden-payload-section h4 {
    font-size: 0.9rem;
    color: var(--primary);
    margin-bottom: 0.5rem;
  }
  .hidden-payload-section .payload-text {
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 0.85rem;
    word-break: break-all;
    color: var(--text);
  }
  .hidden-payload-section .payload-text.empty {
    color: var(--text-dim);
    font-style: italic;
  }
  footer {
    text-align: center;
    padding: 1rem;
    font-size: 0.8rem;
    color: var(--text-dim);
    opacity: 0.6;
  }
</style>
</head>
<body>
<header>
  <h1>QRed — QR Photo Analyzer</h1>
  <p>Upload a photo containing a QR code to inspect all data including hidden payloads</p>
</header>
<main>
  <label class="upload-zone" id="uploadZone" for="fileInput">
    <div class="icon">\uD83D\uDCF7</div>
    <p>Click to select photos or drag &amp; drop</p>
    <p class="hint">JPG, PNG, WEBP — single or multiple files</p>
    <span class="upload-button">Choose photos</span>
    <p class="upload-status ready" id="uploadStatus">Ready to scan</p>
    <input type="file" id="fileInput" accept="image/*" multiple>
  </label>

  <div id="results" class="results"></div>
</main>

<footer>QRed — Tamper-Evident Document Sealing <span class="app-version" id="appVersion">v1.0.11</span></footer>

<script type="module">
import { createTestAnalyzerController, qredDisplayTextFromScannedPayload, qredTextFromPhotoScanResult, qredTextFromScanResult } from "./src/testAnalyzer.js";

const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const uploadStatus = document.getElementById('uploadStatus');
const resultsDiv = document.getElementById('results');

const controller = createTestAnalyzerController({ uploadZone, fileInput, uploadStatus, resultsDiv });
const handleSelectedFiles = controller.handleSelectedFiles.bind(controller);

// Mobile picker fallback — awaitingFileSelection triage across focus/visibilitychange (preserved behavior)
fileInput.addEventListener('click', () => {
  controller.awaitingFileSelection = true;
  uploadStatus.textContent = 'Choose an image, then tap Done…';
  uploadStatus.classList.remove('ready','done'); uploadStatus.classList.add('loading');
});

window.addEventListener('focus', () => {
  if (controller.awaitingFileSelection && fileInput.files.length) {
    handleSelectedFiles(fileInput.files, 'focus');
  }
});

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && controller.awaitingFileSelection && fileInput.files.length) {
    handleSelectedFiles(fileInput.files, 'visibility');
  }
});

fileInput.addEventListener('input', (e) => {
  if (e.target.files.length) handleSelectedFiles(e.target.files, 'input');
});

fileInput.addEventListener('change', (e) => {
  if (e.target.files.length) handleSelectedFiles(e.target.files, 'change');
});

// Drag and drop
uploadZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  uploadZone.classList.add('dragover');
});
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleSelectedFiles(e.dataTransfer.files, 'drop');
});

if (new URLSearchParams(window.location.search).has('debugQRed')) {
  window.__qredStandaloneTestHooks = { qredDisplayTextFromScannedPayload, qredTextFromPhotoScanResult, qredTextFromScanResult };
}
</script>
</body>
</html>
